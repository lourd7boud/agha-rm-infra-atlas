# Canonical host-nginx vhost for atlas.marocinfra.com — version-controlled copy
# of the live /etc/nginx/sites-available/atlas.marocinfra.com on the prod VPS.
#
# WHY THIS FILE EXISTS: production runs the host's nginx (NOT the bundled
# platform/Caddyfile). Keycloak is served on the SAME origin under /auth/*
# (KC_HTTP_RELATIVE_PATH=/auth, KC_HOSTNAME=https://atlas.marocinfra.com/auth).
# The `location /auth/` block below is the load-bearing one: if it is ever
# dropped from the live config, Keycloak's authorize URL falls through to
# `location / -> web` and Next.js renders a bare 404 mid-re-authentication
# (the "session ended, stuck on a 404 instead of /login" bug). Keeping the
# vhost in git means a dropped block can always be restored from here.
#
# APPLY / RESTORE ON THE VPS:
#   sudo cp platform/nginx/atlas.marocinfra.com.conf \
#           /etc/nginx/sites-available/atlas.marocinfra.com
#   sudo ln -sf /etc/nginx/sites-available/atlas.marocinfra.com \
#               /etc/nginx/sites-enabled/atlas.marocinfra.com
#   sudo nginx -t && sudo systemctl reload nginx
#
# VERIFY /auth is routed to Keycloak (expect HTTP 200 + a Keycloak JSON body):
#   curl -s -o /dev/null -w '%{http_code}\n' \
#     https://atlas.marocinfra.com/auth/realms/atlas/.well-known/openid-configuration
#
# NOTE: the `listen 443 ssl` / ssl_certificate* lines are managed by certbot
# (`certbot --nginx -d atlas.marocinfra.com`). If you restore this file on a
# host where certbot has not yet issued the cert, run certbot first (or drop
# the ssl block to `listen 80;` until the cert exists) so `nginx -t` passes.

server {
    server_name atlas.marocinfra.com;

    # next-auth JWT Set-Cookie headers are large; raise proxy buffers.
    proxy_buffer_size 32k;
    proxy_buffers 8 32k;
    proxy_busy_buffers_size 64k;

    # Prometheus scrape endpoint — internal only, never public.
    location = /api/metrics { return 403; }

    # Keycloak (OIDC). LOAD-BEARING: dropping this 404s the whole login flow.
    location /auth/ {
        proxy_pass http://127.0.0.1:8081/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
    }
    # NextAuth routes live in the web app — must be routed to web, not core.
    location /api/auth/ {
        proxy_pass http://127.0.0.1:13001;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/tender/ {
        proxy_pass http://127.0.0.1:13001;
        proxy_read_timeout 180s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/tenders/ {
        proxy_pass http://127.0.0.1:13001;
        proxy_read_timeout 180s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/public/ {
        proxy_pass http://127.0.0.1:13001;
        proxy_read_timeout 180s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/ {
        proxy_pass http://127.0.0.1:13000/api/;
        proxy_read_timeout 180s;
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # ── Projets & Chantiers (ported BTP construction-management app) ──────────
    # Lift-and-shift of the standalone BTP app under /projects/. The React SPA is
    # static (HashRouter, so no per-route SPA fallback needed beyond index.html);
    # the Express API + socket.io + uploads are proxied to the projects-api
    # container on loopback :13010 (platform/docker-compose.projects.yml). These
    # blocks precede `location /` so /projects/* never falls through to the Next web.
    client_max_body_size 500M;

    location = /projects { return 301 /projects/; }

    location ^~ /projects/api/ {
        proxy_pass http://127.0.0.1:13010/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Access-Control-Expose-Headers "X-New-Token" always;
        client_max_body_size 500M;
        proxy_request_buffering off;
        proxy_read_timeout 300s;
    }

    location ^~ /projects/socket.io/ {
        proxy_pass http://127.0.0.1:13010/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location ^~ /projects/uploads/ {
        proxy_pass http://127.0.0.1:13010/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 500M;
        expires 7d;
        add_header Cache-Control "private, max-age=604800";
    }

    location ^~ /projects/ {
        alias /var/www/atlas-projects/;
        index index.html;
        try_files $uri $uri/ /projects/index.html;
    }

    location / {
        proxy_pass http://127.0.0.1:13001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/atlas.marocinfra.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/atlas.marocinfra.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = atlas.marocinfra.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name atlas.marocinfra.com;
    return 404; # managed by Certbot
}
