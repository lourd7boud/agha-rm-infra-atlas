# Canonical host-nginx vhost for atlas.marocinfra.com — version-controlled copy
# of the live /etc/nginx/sites-available/atlas.marocinfra.com on the prod VPS.
#
# WHY THIS FILE EXISTS: production runs the host's nginx (NOT the bundled
# platform/Caddyfile). Keycloak is served on the SAME origin under /auth/*
# (KC_HTTP_RELATIVE_PATH=/auth, KC_HOSTNAME=https://atlas.marocinfra.com/auth).
# The `location /auth/` block below is the load-bearing one: if it is ever
# dropped from the live config, Keycloak's authorize URL falls through to
# `location / -> web` and Next.js renders a bare 404 mid-re-authentication
# (the "session ended, stuck on a 404 instead of /login" bug). Keeping the
# vhost in git means a dropped block can always be restored from here.
#
# APPLY / RESTORE ON THE VPS:
#   sudo cp platform/nginx/atlas.marocinfra.com.conf \
#           /etc/nginx/sites-available/atlas.marocinfra.com
#   sudo ln -sf /etc/nginx/sites-available/atlas.marocinfra.com \
#               /etc/nginx/sites-enabled/atlas.marocinfra.com
#   sudo nginx -t && sudo systemctl reload nginx
#
# VERIFY /auth is routed to Keycloak (expect HTTP 200 + a Keycloak JSON body):
#   curl -s -o /dev/null -w '%{http_code}\n' \
#     https://atlas.marocinfra.com/auth/realms/atlas/.well-known/openid-configuration
#
# NOTE: the `listen 443 ssl` / ssl_certificate* lines are managed by certbot
# (`certbot --nginx -d atlas.marocinfra.com`). If you restore this file on a
# host where certbot has not yet issued the cert, run certbot first (or drop
# the ssl block to `listen 80;` until the cert exists) so `nginx -t` passes.

server {
    server_name atlas.marocinfra.com;

    # next-auth JWT Set-Cookie headers are large; raise proxy buffers.
    proxy_buffer_size 32k;
    proxy_buffers 8 32k;
    proxy_busy_buffers_size 64k;

    # Prometheus scrape endpoint — internal only, never public.
    location = /api/metrics { return 403; }

    # Keycloak (OIDC). LOAD-BEARING: dropping this 404s the whole login flow.
    location /auth/ {
        proxy_pass http://127.0.0.1:8081/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
    }
    # NextAuth routes live in the web app — must be routed to web, not core.
    location /api/auth/ {
        proxy_pass http://127.0.0.1:13001;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # BTP BFF routes (Next app): Excel exports + MinIO file relay. Without these
    # carve-outs the /api/ catch-all sends them to core, which 404s.
    location /api/btp-export/ {
        proxy_pass http://127.0.0.1:13001;
        proxy_read_timeout 120s;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/btp-asset/ {
        proxy_pass http://127.0.0.1:13001;
        proxy_read_timeout 120s;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/compta-doc/ {
        proxy_pass http://127.0.0.1:13001;
        proxy_read_timeout 120s;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/bdc-devis/ {
        proxy_pass http://127.0.0.1:13001;
        proxy_read_timeout 120s;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/tender/ {
        proxy_pass http://127.0.0.1:13001;
        proxy_read_timeout 180s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/tenders/ {
        proxy_pass http://127.0.0.1:13001;
        proxy_read_timeout 180s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/public/ {
        proxy_pass http://127.0.0.1:13001;
        proxy_read_timeout 180s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/ {
        proxy_pass http://127.0.0.1:13000/api/;
        proxy_read_timeout 180s;
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # ── Projets BTP ────────────────────────────────────────────────────────────
    # The BTP projects module is now NATIVE (Next.js /projects/* + /api/btp/*):
    # no dedicated blocks — /projects falls through to `location /` (web) and
    # /api/btp to the /api catch-all (core). The old lift-and-shift SPA blocks
    # (:13010 + /var/www/atlas-projects) were retired with the rebuild; the
    # projects-postgres container stays up as the btpdb migration source only.
    # Chantier photo/document uploads go through Next server actions → core.
    client_max_body_size 100M;
    # Neutralize any stale BTP PWA service worker registered under /projects/
    # during the earlier lift-and-shift: serve a self-unregistering SW so browsers
    # drop it and fall back to the native Next.js /projects pages.
    location = /projects/sw.js {
        default_type application/javascript;
        add_header Cache-Control "no-store" always;
        return 200 "self.addEventListener('install',function(){self.skipWaiting()});self.addEventListener('activate',function(e){e.waitUntil((async function(){try{await self.registration.unregister();var ks=await caches.keys();await Promise.all(ks.map(function(k){return caches.delete(k)}));var cs=await self.clients.matchAll();cs.forEach(function(c){c.navigate(c.url)})}catch(x){}})())});";
    }

    location / {
        proxy_pass http://127.0.0.1:13001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/atlas.marocinfra.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/atlas.marocinfra.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = atlas.marocinfra.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name atlas.marocinfra.com;
    return 404; # managed by Certbot
}
