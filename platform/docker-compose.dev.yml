# ATLAS development stack — lean: only what ATLAS Core needs locally.
# Keycloak/Odoo/Metabase/Caddy run in staging/prod (docker-compose.yml).
# All ports bound to loopback; credentials are dev-only placeholders.
name: atlas-dev

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: atlas-dev
      POSTGRES_DB: atlas
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
      - ./initdb-dev:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas -d atlas"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - redisdata_dev:/data

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - miniodata_dev:/data

volumes:
  pgdata_dev:
  redisdata_dev:
  miniodata_dev:
