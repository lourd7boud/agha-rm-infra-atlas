# ATLAS applications (staging/prod): Core API + staff portal.
# Joins the platform stack's network so `postgres`, `redis`, `minio`,
# `keycloak` and `caddy` resolve by service name:
#   docker compose -f platform/docker-compose.yml up -d        # platform first
#   docker compose -f platform/docker-compose.apps.yml up -d --build
# Secrets live in platform/.env.apps (git-ignored, template alongside).
name: atlas-apps

services:
  core:
    build:
      context: ..
      dockerfile: apps/core/Dockerfile
    restart: unless-stopped
    env_file: .env.apps
    environment:
      NODE_ENV: production
      PORT: "3000"
      # datao-parity: this is the API-only process. Sentinel + BullMQ worker
      # live in the separate `worker` service below, so the event loop here
      # stays free for HTTP requests and Next.js SSR (no more /tenders 504s
      # during extraction bursts).
      WATCH_WORKER_ENABLED: "false"
    # Caps sized for the 2 vCPU / 3.7 GB VPS: no single container may starve
    # the box. cpus are ceilings, not reservations.
    cpus: 1.5
    mem_limit: 512m
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    # No published port: Caddy reaches core:3000 on the shared network.

  worker:
    # Same image as `core` (built once), different role: this container is the
    # ONLY process that runs the Sentinel scheduler + BullMQ consumer + dossier
    # extraction. Isolates the CPU-heavy PDF-vision + LLM extraction from the
    # HTTP API process — mirrors datao's architecture where extraction lives on
    # a separate worker (Vercel Functions / dedicated infra). Consumes the same
    # Redis queue as core would have; only one of the two ever schedules a
    # sweep because of the WATCH_WORKER_ENABLED gate in watch.module.ts.
    build:
      context: ..
      dockerfile: apps/core/Dockerfile
    restart: unless-stopped
    env_file: .env.apps
    environment:
      NODE_ENV: production
      PORT: "3000"
      WATCH_WORKER_ENABLED: "true"
      # Drain the portal-detail backlog aggressively per sweep (default 40 is too
      # slow for the ~5 k version-stale rows). Newest-first, zero LLM, idempotent
      # via the raw.detail.v version predicate — safe to run large. Lower back to
      # ~40 once the corpus is fully at DETAIL_VERSION if sweep latency matters.
      WATCH_DETAIL_BACKFILL: "300"
    # The extraction pipeline (PDF vision + LLM) is the known CPU/RAM hog:
    # cap it at one core so the API always keeps a core for HTTP.
    cpus: 1.0
    mem_limit: 640m
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      core:
        condition: service_healthy
    # No published port: internal-only, never receives HTTP traffic.

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    env_file: .env.apps
    environment:
      NODE_ENV: production
    cpus: 1.0
    mem_limit: 384m
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/login').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      core:
        condition: service_healthy

networks:
  default:
    name: atlas-platform_default
    external: true
