# Prometheus scrape configuration — ATLAS dev observability profile.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: atlas-core
    metrics_path: /api/metrics
    static_configs:
      - targets: ["host.docker.internal:3000"]
        labels:
          service: atlas-core
          env: dev
