# ATLAS observability profile (dev): Prometheus + Grafana, loopback-only.
# Staging/prod add Loki (docker log driver) per security-compliance §3.
#   docker compose -f platform/docker-compose.observability.yml up -d
name: atlas-observability

services:
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:3002:3000"
    environment:
      # Dev-only credentials; staging/prod switch to Keycloak OIDC.
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./observability/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - grafanadata:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  promdata:
  grafanadata:
