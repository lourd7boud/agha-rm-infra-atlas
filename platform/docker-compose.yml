name: atlas-platform

# Resource caps are sized for the 2 vCPU / 3.7 GB staging VPS. Without them a
# single JVM (Keycloak/Metabase) or an Odoo worker burst can OOM the whole box
# — the root cause behind the "everything is slow" episodes. cpus are ceilings.
# Memory budget (this file + docker-compose.apps.yml): 2240 + 1536 = 3776 MB,
# i.e. the SUM of ceilings fits in RAM even in the worst case. The hot set
# (postgres+redis+core+worker+web+caddy ≈ 2.3 GB) leaves ~1.4 GB for the JVMs.
services:
  postgres:
    # pgvector build of Postgres 16 — required by initdb (CREATE EXTENSION vector)
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    cpus: 1.0
    mem_limit: 512m
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    # No public port. Access via `docker compose exec` or Tailscale-only tunnel.

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    cpus: 0.5
    mem_limit: 96m
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    cpus: 0.5
    mem_limit: 192m
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    restart: unless-stopped
    cpus: 0.75
    mem_limit: 512m
    command: ["start", "--http-enabled", "true", "--proxy-headers", "xforwarded"]
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KC_HOSTNAME: https://auth.${DOMAIN}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      # Exposes /health/ready on the management port (9000) for the healthcheck.
      KC_HEALTH_ENABLED: "true"
    healthcheck:
      # Official Keycloak guidance: the image ships no curl/wget, so probe the
      # readiness endpoint over bash's /dev/tcp (explicitly bash — /bin/sh is
      # not guaranteed to be bash on ubi9 variants). A plain TCP open is not
      # enough: the port listens before the DB connection is ready.
      test:
        [
          "CMD-SHELL",
          "bash -c 'exec 3<>/dev/tcp/127.0.0.1/9000 && echo -e \"GET /health/ready HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n\" >&3 && grep -q \"200\" <&3'",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s
    depends_on:
      postgres:
        condition: service_healthy

  odoo:
    # No ATLAS integration yet (zero code references) — kept alive for manual
    # use only, so it gets the smallest JVM-free budget of the heavy trio.
    image: odoo:18
    restart: unless-stopped
    cpus: 0.75
    mem_limit: 288m
    environment:
      HOST: postgres
      USER: odoo
      PASSWORD: ${ODOO_DB_PASSWORD}
    volumes:
      - odoodata:/var/lib/odoo
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8069/web/health', timeout=4)",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    depends_on:
      postgres:
        condition: service_healthy

  metabase:
    image: metabase/metabase:latest
    restart: unless-stopped
    cpus: 0.75
    mem_limit: 512m
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: "5432"
      MB_DB_USER: metabase
      MB_DB_PASS: ${METABASE_DB_PASSWORD}
      MB_DB_HOST: postgres
    healthcheck:
      # curl today, wget fallback in case an upstream base-image swap drops it.
      test:
        [
          "CMD-SHELL",
          "curl -fs http://127.0.0.1:3000/api/health || wget -qO- http://127.0.0.1:3000/api/health || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 120s
    depends_on:
      postgres:
        condition: service_healthy

  backup:
    # Daily pg_dump of every database + 14-day rotation; restore drill:
    #   docker compose exec backup /scripts/pg-restore-drill.sh
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    cpus: 0.25
    mem_limit: 48m
    entrypoint:
      ["sh", "-c", "while true; do /scripts/pg-backup.sh; sleep 86400; done"]
    environment:
      PGHOST: postgres
      PGUSER: postgres
      PGPASSWORD: ${POSTGRES_PASSWORD}
      RETENTION_DAYS: "14"
    volumes:
      - ./scripts:/scripts:ro
      - ./backups:/backups
    depends_on:
      postgres:
        condition: service_healthy

  caddy:
    image: caddy:2
    restart: unless-stopped
    cpus: 0.5
    mem_limit: 80m
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config
    depends_on:
      - keycloak
      - odoo
      - metabase
      - minio

volumes:
  pgdata:
  redisdata:
  miniodata:
  odoodata:
  caddydata:
  caddyconfig:
